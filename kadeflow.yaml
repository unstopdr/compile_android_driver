project:
  name: "ci-kade"                  # lyenv project name
  plugin: "kade"                   # plugin name

# kade base config (overrides merged into kade plugin config.yaml)
kade:
  config_overrides:
    kernel:
      flavor: "non_gki"  # 关键：启用 non-GKI 模式[reference:9]

    non_gki:
      # 1. 配置内核源码来源 (使用小米官方仓库)[reference:10]
      source:
        type: "repo"
        repo_url: "https://github.com/MiCode/Xiaomi_Kernel_OpenSource"
        branch: "pissarro-r-oss"

      # 2. 配置构建方式 (使用 script 模式)[reference:11]
      build:
        mode: "script"
        script: "build.sh"        # 将使用仓库根目录下的 build.sh
        artifacts_dir: "out"      # 产物输出目录

      # 3. 配置外置驱动 (SukiSU LKM)[reference:12][reference:13]
      driver:
        project_name: "sukisu"
        in_tree: false            # 声明为外置驱动
        external_src_dir: "${GITHUB_WORKSPACE}/code"
        module_name: "sukisu.ko"  # 生成的模块名
        overwrite: true

    # (可选但强烈推荐) 如果 SukiSU 需要特殊内核符号，在此声明[reference:14][reference:15]
    abi:
      upstream_patch: true
      symbols_file: "${GITHUB_WORKSPACE}/abi.symbols"

# Default CI flow: build + export (minimal, as you requested)
flow:
  steps:
    - "kade prepare"
    - "kade deps"
    - "kade sync"
    - "kade abi_upstream"
    # abi step is injected automatically by runner if abi.symbols_file or abi.symbols provided
    - "kade build"
    - "kade export"
  post_commands: []                # users can add extra commands here, e.g. compile_commands/img unpack

artifacts:
  name: "kade-artifacts"
  paths:
    - "${LYENV_HOME}/workspace/exports/**"
    - "${LYENV_HOME}/workspace/**/compile_commands.json"
    - "${GITHUB_WORKSPACE}/img_out/**"     # if user adds img unpack to post_commands
